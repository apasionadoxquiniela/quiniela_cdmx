<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Victoria Segura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="hero-banner">
            <img src="banner_horizontal.png" alt="Banner" style="width:100%; display:block;">
        </header>

        <section class="simulator-container">
            <div class="sim-card">
                <h3>SIMULADOR DE VICTORIA</h3>
                <div class="sim-body">
                    <input type="number" id="monto-apuesta" placeholder="Monto ($)">
                    <div id="val-ganancia" style="font-weight:bold; color:#D4AF37;">Ganas: $0.00</div>
                </div>
            </div>
        </section>

        <div class="league-nav" style="padding:10px;">
            <select id="selector-liga" onchange="cargarJornada()" style="width:100%; padding:10px;">
                <option value="liga_mx">🇲🇽 Liga MX</option>
                <option value="premier">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</option>
                <option value="laliga">🇪🇸 La Liga</option>
            </select>
        </div>

        <main id="jornada-container"></main>

        <footer style="position:fixed; bottom:0; width:100%; max-width:480px; padding:20px; background:white;">
            <button onclick="iniciarProcesoPago()" class="btn-main-pay">REGISTRAR Y PAGAR</button>
        </footer>
    </div>
    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
