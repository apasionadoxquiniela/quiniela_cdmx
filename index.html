<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Victoria Segura</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Banner de Identidad -->
        <header class="hero-banner">
            <img src="banner_horizontal.png" alt="Quiniela CDMX">
        </header>

        <!-- Simulador de Ganancias -->
        <section class="simulator-container">
            <div class="sim-card">
                <h3>SIMULADOR DE VICTORIA</h3>
                <div class="sim-body">
                    <input type="number" id="monto-apuesta" placeholder="¿Cuanto juegas? ($)">
                    <div id="val-ganancia" class="ganancia-text">Ganas: $0.00</div>
                </div>
            </div>
        </section>

        <!-- Selector de Ligas -->
        <div class="league-nav">
            <select id="selector-liga" onchange="cargarJornada()">
                <option value="liga_mx">LIGA MX - MEXICO</option>
                <option value="premier">PREMIER LEAGUE - INGLATERRA</option>
                <option value="laliga">LA LIGA - ESPANA</option>
            </select>
        </div>

        <!-- Contenedor Dinamico de Partidos -->
        <main id="jornada-container">
            <!-- Aqui se cargan los partidos desde logic.js -->
        </main>

        <!-- Boton Flotante de Registro -->
        <footer class="payment-footer">
            <button onclick="iniciarProcesoPago()" class="btn-main-pay">
                REGISTRAR Y PAGAR
            </button>
        </footer>
    </div>

    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
