<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Multi-Liga Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Banner de Identidad Visual -->
        <header class="hero-banner">
            <img src="banner_horizontal.png" alt="Quiniela CDMX">
        </header>

        <!-- Selectores de Liga y Jornada -->
        <section class="selectors-container">
            <div class="field">
                <label>ELIGE TU LIGA:</label>
                <select id="selector-liga" onchange="cargarJornada()">
                    <option value="liga_mx">LIGA MX - MEXICO</option>
                    <option value="premier">PREMIER LEAGUE - INGLATERRA</option>
                    <option value="laliga">LA LIGA - ESPANA</option>
                </select>
            </div>
            <div class="field">
                <label>TIPO DE JORNADA:</label>
                <select id="selector-tipo" onchange="cargarJornada()">
                    <option value="media_semana">MEDIA SEMANA (9 PARTIDOS + 1)</option>
                    <option value="fin_semana">FIN DE SEMANA (COMPLETA)</option>
                </select>
            </div>
        </section>

        <!-- Contenedor Dinámico donde se cargan los partidos -->
        <main id="jornada-container"></main>

        <!-- Botonera de Acción Flotante -->
        <footer class="payment-footer">
            <button onclick="iniciarProcesoPago()" class="btn-main-pay">
                REGISTRAR QUINIELA Y PAGAR
            </button>
        </footer>
    </div>

    <!-- SCRIPTS EN ORDEN DE IMPORTANCIA:
         1. Carga primero la base de datos de logos.
         2. Carga los partidos de la semana.
         3. Ejecuta la lógica para mostrar todo en pantalla.
    -->
    <script src="logos_database.js"></script>
    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
