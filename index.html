<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Multi-Liga</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="hero-banner">
            <img src="banner_horizontal.png" alt="Banner Quiniela">
        </header>

        <section class="selectors-container">
            <div class="field">
                <label>ELIGE LIGA:</label>
                <select id="selector-liga" onchange="cargarJornada()">
                    <option value="liga_mx">LIGA MX 🇲🇽</option>
                    <option value="premier">PREMIER LEAGUE 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
                    <option value="laliga">LA LIGA 🇪🇸</option>
                </select>
            </div>
            <div class="field">
                <label>JORNADA:</label>
                <select id="selector-tipo" onchange="cargarJornada()">
                    <option value="media_semana">MEDIA SEMANA (9+1)</option>
                    <option value="fin_semana">FIN DE SEMANA</option>
                </select>
            </div>
        </section>

        <main id="jornada-container"></main>

        <footer class="payment-footer">
            <button onclick="iniciarProcesoPago()" class="btn-main-pay">REGISTRAR Y PAGAR</button>
        </footer>
    </div>
    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
