<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Elite Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo-area">
                <img src="https://cdn-icons-png.flaticon.com/512/5323/5323982.png" alt="Logo" class="main-logo">
                <h1>QUINIELA <span>CDMX</span></h1>
            </div>
            <select id="liga-selector" onchange="actualizarLiga()">
                <option value="liga_mx">Liga MX 🇲🇽</option>
                <option value="premier">Premier League 🏴󠁧󠁢󠁥󠁮󠁧󠁿</option>
                <option value="laliga">La Liga 🇪🇸</option>
            </select>
        </header>

        <section class="simulator-card">
            <h3>Simulador de Ganancia</h3>
            <div class="sim-grid">
                <input type="number" id="monto-apuesta" placeholder="¿Cuánto apuestas?">
                <div class="ganancia-box">Ganas: <span id="resultado-sim">$0</span></div>
            </div>
        </section>

        <form id="quiniela-form">
            <div id="contenedor-partidos">
                <!-- Los partidos de cualquier liga del mundo se cargan aquí -->
            </div>
            
            <div class="floating-footer">
                <button type="button" onclick="procesarPago()" class="btn-checkout">
                    Enviar y Pagar con Tarjeta
                </button>
            </div>
        </form>
    </div>
    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
