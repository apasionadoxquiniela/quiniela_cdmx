<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiniela CDMX | Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="hero-banner">
            <img src="banner_horizontal.png" alt="Quiniela CDMX">
        </header>

        <section class="selectors-container">
            <div class="field">
                <label>ELIGE TU LIGA:</label>
                <select id="selector-liga" onchange="cargarJornada()">
                    <option value="liga_mx">LIGA MX - MÉXICO</option>
                    <option value="premier">PREMIER LEAGUE - INGLATERRA</option>
                </select>
            </div>
            <div class="field">
                <label>TIPO DE JORNADA:</label>
                <select id="selector-tipo" onchange="cargarJornada()">
                    <option value="media_semana">MEDIA SEMANA (9 + COMODÍN)</option>
                </select>
            </div>
        </section>

        <main id="jornada-container"></main>

        <footer class="payment-footer">
            <button onclick="iniciarProcesoPago()" class="btn-main-pay">REGISTRAR Y PAGAR</button>
        </footer>
    </div>

    <!-- Orden de carga crítico -->
    <script src="logos_database.js"></script>
    <script src="admin.js"></script>
    <script src="logic.js"></script>
</body>
</html>
